<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID LAGBO | The Trusted ID Empire</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-core: #010101;
            --dark-deep: #080808;
            --gold: linear-gradient(135deg, #d4af37 0%, #f1d592 100%);
            --border-gold: #c6a152;
            --text-gray: #a0a0a0;
            --available: #2ecc71;
            --sold: #e74c3c;
            --shadow-premium: 0 10px 40px rgba(212, 175, 55, 0.2);
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--dark-core); color: #fff; margin: 0; padding-bottom: 50px; overflow-x: hidden; }

        /* হেডার - আপনার ফিক্সড লোগো ও নাম (সার্কেল ফিক্সড) */
        .brand-header { text-align: center; padding: 60px 20px; background: radial-gradient(circle, #151515 0%, var(--dark-core) 100%); border-bottom: 3px solid var(--border-gold); position: relative; }
        
        /* লোগো কন্টেইনার - নিখুঁত গোল করার জন্য */
        .logo-container { width: 140px; height: 140px; margin: 0 auto; position: relative; border-radius: 50%; padding: 4px; /* বর্ডারের জন্য গ্যাপ */ background: var(--gold); box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); overflow: hidden; }
        .brand-header img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; border: none; }
        
        .brand-header h1 { font-size: 3rem; font-weight: 800; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 20px 0 5px; letter-spacing: 5px; text-transform: uppercase; }
        .brand-header p { color: var(--text-gray); letter-spacing: 3px; font-size: 1rem; text-transform: uppercase; font-weight: 600; margin-top: 5px; }

        /* ট্রাস্ট ব্যাজ সেকশন */
        .trust-section { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 25px; background: var(--dark-deep); border-bottom: 1px solid #222; }
        .badge { display: flex; align-items: center; gap: 8px; color: #f1d592; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* আইডি গ্রিড */
        .id-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 35px; padding: 50px 20px; max-width: 1400px; margin: 0 auto; }

        /* আইডি কার্ড */
        .id-card { background: #0a0a0a; border: 2px solid #222; border-radius: 20px; overflow: hidden; position: relative; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .id-card:hover { transform: translateY(-15px); border-color: var(--border-gold); box-shadow: var(--shadow-premium); }

        /* স্ট্যাটাস ব্যাজ */
        .status-badge { position: absolute; top: 20px; right: 20px; padding: 7px 20px; border-radius: 50px; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.6); letter-spacing: 1px; }
        .status-available { background: var(--available); color: #000; }
        .status-sold { background: var(--sold); color: #fff; }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-bottom: 2px solid var(--border-gold); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .details { padding: 30px; position: relative; }
        .details h2 { margin: 0; font-size: 1.7rem; font-weight: 700; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .details p { color: var(--text-gray); font-size: 1rem; line-height: 1.7; margin: 20px 0; min-height: 50px; }
        
        .price-tag { font-size: 2.3rem; font-weight: 800; color: #fff; display: block; margin-top: 20px; padding-top: 20px; border-top: 1px solid #333; text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1); }

        /* হোয়াটসঅ্যাপ বাটন */
        .order-btn { display: flex; align-items: center; justify-content: center; gap: 12px; background: var(--gold); color: #000; text-decoration: none; padding: 20px; font-weight: 800; font-size: 1.2rem; transition: 0.3s; text-transform: uppercase; border-radius: 0 0 20px 20px; letter-spacing: 1px; }
        .order-btn:hover { background: #fff; color: #000; transform: scale(1.02); }
        .order-btn.sold-btn { background: #333; color: #888; cursor: not-allowed; pointer-events: none; }
        .order-btn img { width: 28px; }

        @media (max-width: 768px) {
            .brand-header h1 { font-size: 2.3rem; letter-spacing: 3px; }
            .brand-header p { font-size: 0.8rem; letter-spacing: 2px; }
            .logo-container { width: 110px; height: 110px; }
            .id-grid { grid-template-columns: 1fr; gap: 25px; padding: 30px 15px; }
            .details h2 { font-size: 1.4rem; }
            .price-tag { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

<div class="brand-header">
    <div class="logo-container">
        <img src="logo.png" alt="ID LAGBO Logo">
    </div>
    <h1>ID LAGBO</h1>
    <p>THE TRUSTED ID EMPIRE</p>
</div>

<div class="trust-section">
    <div class="badge">🛡️ 100% SECURE</div>
    <div class="badge">⚡ FAST DELIVERY</div>
    <div class="badge">🤝 VERIFIED OWNER</div>
</div>

<div class="id-grid" id="market-engine">
    </div>

<script>
    const inventory = [
        {
            name: "COBRA MAX #001",
            desc: "Level 68 | 5 Evo Guns Max | Season 2 Old Elite Pass skins.",
            price: "4,500",
            youtubeId: "quNRATyRdQY",
            whatsapp: "8801XXXXXXXXX",
            isSold: false
        },
        {
            name: "HIP HOP BUNDLE #002",
            desc: "Level 72 | Ranked Master | Rare Blue Skins | 100% Secure.",
            price: "12,500",
            youtubeId: "pUgiERw78NU",
            whatsapp: "8801XXXXXXXXX",
            isSold: true
        }
    ];

    function loadInventory() {
        const engine = document.getElementById('market-engine');
        engine.innerHTML = '';

        inventory.forEach(item => {
            const statusClass = item.isSold ? 'status-sold' : 'status-available';
            const statusText = item.isSold ? 'Sold Out' : 'Available';
            const btnClass = item.isSold ? 'order-btn sold-btn' : 'order-btn';
            const btnText = item.isSold ? 'Stock Out' : 'অর্ডার নিশ্চিত করুন';
            
            const waMsg = encodeURIComponent(`হ্যালো আইডি লাগবো, আমি এই আইডিটি নিতে চাই:\nআইডি: ${item.name}\nদাম: ৳ ${item.price}`);
            
            engine.innerHTML += `
                <div class="id-card">
                    <div class="status-badge ${statusClass}">${statusText}</div>
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/${item.youtubeId}" allowfullscreen></iframe>
                    </div>
                    <div class="details">
                        <h2>${item.name}</h2>
                        <p>${item.desc}</p>
                        <span class="price-tag">৳ ${item.price}</span>
                    </div>
                    <a href="https://wa.me/${item.whatsapp}?text=${waMsg}" class="${btnClass}" target="_blank">
                        ${!item.isSold ? '<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">' : ''}
                        ${btnText}
                    </a>
                </div>
            `;
        });
    }

    loadInventory();
</script>

</body>
</html>
