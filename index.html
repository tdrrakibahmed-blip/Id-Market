<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID LAGBO | Secure Payment Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-core: #010101;
            --gold: linear-gradient(135deg, #d4af37 0%, #f1d592 100%);
            --border-gold: #c6a152;
            --available: #2ecc71;
            --sold: #e74c3c;
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--dark-core); color: #fff; margin: 0; padding-bottom: 50px; }

        /* হেডার - লোগো ও নাম (ফিক্সড) */
        .brand-header { text-align: center; padding: 60px 20px; background: radial-gradient(circle, #151515 0%, var(--dark-core) 100%); border-bottom: 3px solid var(--border-gold); }
        .logo-container { width: 130px; height: 130px; margin: 0 auto; border-radius: 50%; padding: 4px; background: var(--gold); box-shadow: 0 0 25px rgba(212, 175, 55, 0.4); overflow: hidden; }
        .brand-header img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
        .brand-header h1 { font-size: 2.8rem; font-weight: 800; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 15px 0 5px; letter-spacing: 4px; text-transform: uppercase; }
        
        .trust-info { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; padding: 15px; background: #080808; border-bottom: 1px solid #222; }
        .info-item { font-size: 0.85rem; font-weight: 700; color: #f1d592; display: flex; align-items: center; gap: 8px; }

        /* আইডি গ্রিড */
        .id-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1300px; margin: 0 auto; }

        /* কার্ড ডিজাইন */
        .id-card { background: #0c0c0c; border: 1px solid #222; border-radius: 20px; overflow: hidden; position: relative; transition: 0.4s; }
        .id-card:hover { transform: translateY(-10px); border-color: var(--border-gold); }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-bottom: 1px solid #333; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .details { padding: 25px; }
        .details h2 { margin: 0; font-size: 1.5rem; color: #f1d592; }
        .details p { color: #a0a0a0; font-size: 0.95rem; line-height: 1.6; margin: 15px 0; }
        .price-tag { font-size: 2rem; font-weight: 800; color: #fff; display: block; padding-top: 15px; border-top: 1px solid #222; }

        .order-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--gold); color: #000; text-decoration: none; padding: 18px; font-weight: 800; font-size: 1.1rem; border-radius: 0 0 20px 20px; transition: 0.3s; cursor: pointer; border: none; width: 100%; }
        .order-btn:hover { background: #fff; }

        /* পেমেন্ট উইন্ডো স্টাইল */
        #paymentModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; justify-content:center; align-items:center; }
        .modal-content { background: #111; border: 2px solid var(--border-gold); padding: 30px; border-radius: 20px; text-align: center; max-width: 420px; width: 90%; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .modal-content h2 { color: #f1d592; margin-bottom: 5px; }
        .payment-method { background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px dashed var(--border-gold); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; font-size: 1rem; }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #888; font-size: 1.8rem; cursor: pointer; }
        label { display: block; text-align: left; font-size: 0.8rem; color: #f1d592; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="brand-header">
    <div class="logo-container"><img src="logo.png" alt="ID LAGBO"></div>
    <h1>ID LAGBO</h1>
    <p>সততা ও বিশ্বাসের সাথে আপনার গেমিং পার্টনার</p>
</div>

<div class="trust-info">
    <div class="info-item">🛡️ ১০০% সিকিউর লেনদেন</div>
    <div class="info-item">⚡ ইনস্ট্যান্ট ডেলিভারি সাপোর্ট</div>
</div>

<div class="id-grid" id="market-engine"></div>

<div id="paymentModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2>পেমেন্ট গেটওয়ে</h2>
        <div class="payment-method">
            <p style="margin:0; font-size:0.85rem; color:#aaa;">বিকাশ/নগদ (Personal)</p>
            <b style="font-size: 1.4rem; color:#fff; letter-spacing: 1px;">01XXXXXXXXX</b>
        </div>
        
        <label>আপনার বিকাশ/নগদ নম্বর:</label>
        <input type="number" id="senderNum" placeholder="যে নম্বর থেকে টাকা পাঠিয়েছেন">
        
        <label>Transaction ID (TrxID):</label>
        <input type="text" id="trxId" placeholder="TrxID এখানে দিন">
        
        <button class="order-btn" style="margin-top:20px;" onclick="submitTrx()">অর্ডার কনফার্ম করুন</button>
        <p style="font-size: 0.75rem; color: #777; margin-top:15px;">টাকা পাঠানোর পর উপরের তথ্যগুলো দিয়ে কনফার্ম করুন। আমাদের টিম চেক করে সরাসরি আপনার হোয়াটসঅ্যাপে আইডি পাঠিয়ে দেবে।</p>
    </div>
</div>

<script>
    let selectedID = "";
    let selectedPrice = "";
    let adminPhone = "8801XXXXXXXXX"; // এখানে আপনার হোয়াটসঅ্যাপ নম্বর দিন

    const inventory = [
        {
            name: "COBRA MAX #001",
            desc: "Level 68 | 5 Evo Guns Max | Season 2 Old Elite Pass.",
            price: "4,500",
            youtubeId: "quNRATyRdQY",
            isSold: false
        },
        {
            name: "HIP HOP BUNDLE #002",
            desc: "Level 72 | Ranked Master | Rare Blue Skins.",
            price: "12,500",
            youtubeId: "pUgiERw78NU",
            isSold: false
        }
    ];

    function loadInventory() {
        const engine = document.getElementById('market-engine');
        inventory.forEach(item => {
            if(!item.isSold) {
                engine.innerHTML += `
                    <div class="id-card">
                        <div class="video-container">
                            <iframe src="https://www.youtube.com/embed/${item.youtubeId}" allowfullscreen></iframe>
                        </div>
                        <div class="details">
                            <h2>${item.name}</h2>
                            <p>${item.desc}</p>
                            <span class="price-tag">৳ ${item.price}</span>
                        </div>
                        <button class="order-btn" onclick="openPayment('${item.name}', '${item.price}')">এখনই কিনুন</button>
                    </div>
                `;
            }
        });
    }

    function openPayment(name, price) {
        selectedID = name;
        selectedPrice = price;
        document.getElementById('paymentModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('paymentModal').style.display = 'none';
    }

    function submitTrx() {
        let sender = document.getElementById('senderNum').value;
        let trx = document.getElementById('trxId').value;

        if(sender.length < 11 || trx.length < 5) {
            alert("অনুগ্রহ করে সঠিক নম্বর এবং Transaction ID দিন।");
            return;
        }

        let message = `নতুন অর্ডার এসেছে!\n\nআইডি: ${selectedID}\nদাম: ৳ ${selectedPrice}\n\nকাস্টমার নম্বর: ${sender}\nTrxID: ${trx}\n\nদয়া করে পেমেন্ট চেক করে আইডি পাঠিয়ে দিন।`;
        window.open(`https://wa.me/${adminPhone}?text=${encodeURIComponent(message)}`, '_blank');
        closeModal();
    }

    loadInventory();
</script>

</body>
</html>
