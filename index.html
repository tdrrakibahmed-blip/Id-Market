<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper AI | Executive Agent</title>
    <style>
        :root { --bg: #0a0b10; --panel: #161b22; --accent: #58a6ff; --text: #c9d1d9; --success: #238636; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Agent Header */
        .header { padding: 20px; background: var(--panel); border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 12px; color: var(--success); display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; }

        /* Terminal Display */
        #terminal { flex: 1; padding: 20px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; }
        .bot-msg { color: var(--accent); margin-bottom: 10px; }
        .user-msg { color: #fff; margin-bottom: 10px; border-left: 2px solid var(--accent); padding-left: 10px; }
        .action-log { color: #8b949e; font-style: italic; font-size: 12px; }

        /* Input Zone */
        .input-area { padding: 20px; background: var(--panel); border-top: 1px solid #30363d; display: flex; gap: 10px; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 6px; outline: none; }
        button { background: var(--accent); border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; letter-spacing: 1px;">SNIPER AGENT v1.0</div>
    <div class="status"><div class="dot"></div> AGENT ACTIVE</div>
</div>

<div id="terminal">
    <div class="bot-msg">> System Initialized...</div>
    <div class="bot-msg">> Welcome, Commander Rakib. I am ready to execute your commands.</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Enter command or task (e.g. /search, /trade, /analyze)..." onkeypress="handleKey(event)">
    <button onclick="processCommand()">EXECUTE</button>
</div>

<script>
    const terminal = document.getElementById('terminal');
    const input = document.getElementById('userInput');

    function log(text, type = 'bot') {
        const div = document.createElement('div');
        div.className = type === 'bot' ? 'bot-msg' : 'user-msg';
        div.innerHTML = type === 'bot' ? `> ${text}` : `[USER]: ${text}`;
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight;
    }

    function actionLog(text) {
        const div = document.createElement('div');
        div.className = 'action-log';
        div.innerText = `* ${text}...`;
        terminal.appendChild(div);
    }

    function handleKey(e) { if (e.key === 'Enter') processCommand(); }

    async function processCommand() {
        const cmd = input.value.trim();
        if (!cmd) return;

        log(cmd, 'user');
        input.value = '';

        // এআই এজেন্টের লজিক (Action Simulation)
        if (cmd.startsWith('/search')) {
            actionLog("Accessing global web index");
            setTimeout(() => log("Search results for '" + cmd.replace('/search', '') + "' have been indexed. Ready for summary."), 1500);
        } 
        else if (cmd.includes('trade') || cmd.includes('market')) {
            actionLog("Connecting to Forex Data Feed");
            setTimeout(() => log("Market Sentiment: Bullish. Liquidity Sweep detected at 1.08425. Awaiting your 1% risk confirmation."), 2000);
        }
        else if (cmd.startsWith('/calculate')) {
            const math = cmd.replace('/calculate', '');
            log("Calculation Result: " + eval(math));
        }
        else {
            actionLog("Thinking");
            // এখানে আপনি ভবিষ্যতে OpenAI বা Gemini API যুক্ত করতে পারবেন
            setTimeout(() => log("Command acknowledged. I will monitor the system for updates regarding: " + cmd), 1000);
        }
    }
</script>

</body>
</html>
