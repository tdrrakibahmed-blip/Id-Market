<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID LAGBO | OSINT Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --gold: #d4af37; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; text-align: center; }
        
        .header { padding: 50px 20px; border-bottom: 1px solid #222; background: linear-gradient(to bottom, #111, #050505); }
        .header h1 { font-family: 'Orbitron', sans-serif; color: var(--gold); letter-spacing: 5px; margin: 0; }

        .search-container { max-width: 700px; margin: 50px auto; padding: 20px; }
        input { 
            width: 80%; padding: 15px; border-radius: 50px; border: 1px solid #333; 
            background: #111; color: var(--neon); font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        
        .trace-btn { 
            margin-top: 20px; padding: 15px 40px; border-radius: 50px; border: none; 
            background: var(--gold); color: #000; font-weight: 900; cursor: pointer; 
            font-family: 'Orbitron', sans-serif; transition: 0.3s;
        }
        .trace-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        .result-box { 
            max-width: 800px; margin: 30px auto; display: none; 
            background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 20px; text-align: left;
        }
        .log-line { font-family: monospace; color: #00ff00; font-size: 0.85rem; margin: 5px 0; }
        .data-card { border-left: 3px solid var(--neon); padding-left: 15px; margin: 15px 0; }
        .data-card h3 { color: var(--gold); margin: 0; font-size: 0.9rem; text-transform: uppercase; }
        .data-card p { margin: 5px 0; color: #ccc; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="header">
    <h1>ID LAGBO</h1>
    <p style="color: #666; font-size: 0.8rem; letter-spacing: 2px;">DIGITAL FOOTPRINT & OSINT ENGINE</p>
</div>

<div class="search-container">
    <input type="text" id="fbLink" placeholder="ফেসবুক প্রোফাইল লিংক পেস্ট করুন...">
    <br>
    <button class="trace-btn" onclick="startTrace()">START DEEP TRACE</button>
</div>

<div class="result-box" id="resultBox">
    <div id="logs"></div>
    <hr border="0" style="border-top:1px solid #222; margin: 20px 0;">
    <div id="finalData" style="display:none;">
        <div class="data-card">
            <h3>Target Identification</h3>
            <p id="targetName">প্রসেসিং হচ্ছে...</p>
        </div>
        <div class="data-card">
            <h3>Cross-Platform Matches</h3>
            <p id="targetSocial">LinkedIn, Instagram, TikTok স্ক্যান করা হচ্ছে...</p>
        </div>
        <div class="data-card">
            <h3>Potential Location/Data Leaks</h3>
            <p id="targetLeaks">পাবলিক ডাটাবেজ চেক করা হচ্ছে...</p>
        </div>
    </div>
</div>

<script>
    function startTrace() {
        const link = document.getElementById('fbLink').value;
        if(!link.includes('facebook.com')) {
            alert('দয়া করে সঠিক ফেসবুক লিংক দিন!');
            return;
        }

        const resBox = document.getElementById('resultBox');
        const logs = document.getElementById('logs');
        resBox.style.display = 'block';
        logs.innerHTML = "";
        
        // সিমিউলেটেড OSINT লজিক
        const steps = [
            "[SYSTEM] Initializing Rakib's Intelligence Engine...",
            "[OSINT] Extracting UserID from Facebook URL...",
            "[SCAN] Searching Global Social Graph (LinkedIn, Twitter, IG)...",
            "[DB] Checking Public Data Leaks & Archives...",
            "[GEO] Analyzing Location Tags from Public Posts...",
            "[INFO] Synthesizing Digital Identity..."
        ];

        let i = 0;
        const interval = setInterval(() => {
            logs.innerHTML += `<div class="log-line">> ${steps[i]}</div>`;
            i++;
            if(i >= steps.length) {
                clearInterval(interval);
                showData(link);
            }
        }, 1000);
    }

    function showData(link) {
        document.getElementById('finalData').style.display = 'block';
        // এখানে আমরা একটি স্মার্ট ডেমো রেজাল্ট দেখাচ্ছি
        // বাস্তবে এখানে আমরা নির্দিষ্ট Google Dorks সার্চ ওপেন করতে পারি
        document.getElementById('targetName').innerText = "ফেসবুক আইডি থেকে প্রাপ্ত নাম এবং ডিজিটাল সিগনেচার ম্যাচ করা হয়েছে।";
        document.getElementById('targetSocial').innerText = "একই ইউজারনেম দিয়ে আরও ৩টি প্ল্যাটফর্মে প্রোফাইল পাওয়ার সম্ভাবনা ৮০%।";
        document.getElementById('targetLeaks').innerText = "কোনো পাবলিক ডাটা লিক পাওয়া যায়নি। প্রোফাইলটি সিকিউর।";
    }
</script>

</body>
    </html>
                                                                                                   </html>
