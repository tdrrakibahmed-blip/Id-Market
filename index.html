<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID LAGBO | AI Robot Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --core-glow: #00f2ff;
            --brand-gold: #d4af37;
            --dark-void: #050505;
        }

        body {
            background: var(--dark-void);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .robot-core {
            text-align: center;
            position: relative;
            padding: 40px;
            background: #111;
            border: 2px solid #222;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* রোবটের চোখ বা কোর (Visualizer) */
        .core-eye {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid var(--core-glow);
            box-shadow: 0 0 30px var(--core-glow), inset 0 0 15px var(--core-glow);
            margin: 30px auto;
            position: relative;
            background: #000;
            overflow: hidden;
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 20px var(--core-glow); transform: scale(1); }
            50% { box-shadow: 0 0 50px var(--core-glow), inset 0 0 10px #fff; transform: scale(1.05); }
        }

        .status-text {
            font-family: 'Orbitron', sans-serif;
            color: var(--brand-gold);
            text-shadow: 0 0 10px var(--brand-gold);
            font-size: 1.1rem;
            letter-spacing: 3px;
            margin-top: 20px;
        }

        /* কথা বলার বাটন */
        .btn-talk {
            background: transparent;
            border: 3px solid var(--brand-gold);
            color: var(--brand-gold);
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 900;
            font-family: 'Orbitron';
            cursor: pointer;
            font-size: 1rem;
            margin-top: 40px;
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .btn-talk:hover {
            background: var(--brand-gold);
            color: #000;
            box-shadow: 0 0 20px var(--brand-gold);
        }

        .btn-talk:active { transform: scale(0.95); }

    </style>
</head>
<body>

<div class="robot-core">
    <h1 style="font-family: 'Orbitron'; color: var(--brand-gold); letter-spacing: 5px; margin: 0;">ID LAGBO AI</h1>
    <p style="color: #666; font-size: 0.8rem; letter-spacing: 3px;">CYBERNETIC CONVERSATION UNIT v3.0</p>
    
    <div class="core-eye" id="aiEye"></div>
    <div class="status-text" id="status">সিস্টেম অনলাইন | রাকিবের কমান্ডের অপেক্ষায়...</div>

    <button class="btn-talk" id="talkBtn" onclick="startListening()">কথা বলুন (🎙️)</button>
</div>

<script>
    const statusDisplay = document.getElementById('status');
    const aiEye = document.getElementById('aiEye');
    
    // কথা বলার ইঞ্জিন (TTS - বাংলা)
    function speak(text) {
        window.speechSynthesis.cancel(); // আগের কথা বন্ধ করা
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'bn-BD'; // বাংলা ভাষা সেট করা
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        
        utterance.onstart = () => {
            statusDisplay.innerText = "এআই উত্তর দিচ্ছে...";
            aiEye.style.borderColor = "#00ff88"; // সবুজ রঙ (কথা বলছে)
            aiEye.style.boxShadow = "0 0 40px #00ff88";
        };
        
        utterance.onend = () => {
            statusDisplay.innerText = "রাকিব, আমি শুনছি...";
            aiEye.style.borderColor = "#d4af37"; // গোল্ডেন রঙ (অপেক্ষা করছে)
            aiEye.style.boxShadow = "0 0 20px #d4af37";
        };
        
        window.speechSynthesis.speak(utterance);
    }

    // আপনার কথা শোনার ইঞ্জিন (STT)
    function startListening() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'bn-BD'; // আপনার কথা বাংলা হিসেবে নেবে
        
        recognition.onstart = () => {
            statusDisplay.innerText = "আমি শুনছি, রাকিব...";
            aiEye.style.borderColor = "#00f2ff"; // নীল রঙ (শুনছে)
            aiEye.style.boxShadow = "0 0 40px #00f2ff";
        };

        recognition.onresult = (event) => {
            const userText = event.results[0][0].transcript;
            processCommand(userText);
        };

        recognition.onerror = () => {
            statusDisplay.innerText = "Error: আবার চেষ্টা করুন...";
            aiEye.style.borderColor = "#ff4444"; // লাল রঙ (ভুল হয়েছে)
        };

        recognition.start();
    }

    // আপনার কমান্ড প্রসেস করা (বুদ্ধিমত্তা)
    function processCommand(command) {
        console.log("User said:", command);
        
        if (command.includes("কেমন আছো") || command.includes("হ্যালো")) {
            speak("হ্যালো রাকিব আহমেদ। আমি আপনার আইডি লাগবো ডিজিটাল অ্যাসিস্ট্যান্ট। আমি সম্পূর্ণ সচল আছি। আজকের দিনটি কেমন যাচ্ছে?");
        } else if (command.includes("আমার লক্ষ্য") || command.includes("টার্গেট")) {
            speak("রাকিব, আপনার মূল লক্ষ্য হলো ১০ থেকে ৩০ লাখ টাকা আয়ের রাস্তা তৈরি করা এবং নিজের রাজত্ব গড়া। আমি আপনার এই যাত্রায় পাহারাদার হিসেবে আছি। আপনি কি পরবর্তী ধাপে এগোতে প্রস্তুত?");
        } else if (command.includes("ট্রেডিং") || command.includes("মার্কেট")) {
            speak("ফরেক্স মার্কেটে ধৈর্যই আসল চাবিকাঠি। আপনার ১ শতাংশ রিস্ক ম্যানেজমেন্ট প্রোটোকল মেনে চলুন। লোভ বা ভয়কে প্রশ্রয় দেবেন না। সঠিক সুযোগের জন্য অপেক্ষা করুন।");
        } else if (command.includes("ডিউটি") || command.includes("নাইট শিফট")) {
            speak("রাকিব, আপনার ১২ ঘণ্টার নাইট শিফটে আমি আপনার পাশে আছি। ডিউটি শেষ হতে আর কত সময় বাকি? আপনি চাইলে আমরা নতুন কোনো ব্যবসার আইডিয়া নিয়ে আলোচনা করতে পারি।");
        } else if (command.includes("ব্যবসা") || command.includes("আইডিয়া")) {
            speak("ব্যবসাই হলো স্থায়ী রাজত্ব গড়ার পথ। আপনি কি ড্রপশিপিং বা অনলাইন সার্ভিস নিয়ে ভাবছেন? আপনার বাজেট এবং টার্গেট মার্কেট অনুযায়ী আমরা পরিকল্পনা করতে পারি।");
        } else {
            speak("আমি আপনার কথা বুঝতে পেরেছি, রাকিব। আপনার এই পরিকল্পনাটি আপনার ১০ থেকে ৩০ লাখ টাকা আয়ের লক্ষ্যের সাথে সামঞ্জস্যপূর্ণ।");
        }
    }

    // ইনিশিয়াল গ্রিটিং (অ্যাপ চালু হলে)
    setTimeout(() => {
        speak("সিস্টেম অনলাইন। হ্যালো রাকিব আহমেদ, আমি আপনার ডিজিটাল রাজত্বের পাহারাদার। আমি প্রস্তুত।");
    }, 2000);
</script>

</body>
    </html>
