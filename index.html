<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>ID LAGBO | OSINT Intelligence Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Poppins', sans-serif; text-align: center; }
        .box { max-width: 600px; margin: 50px auto; padding: 30px; background: #111; border: 2px solid #d4af37; border-radius: 15px; }
        input { width: 90%; padding: 15px; margin-bottom: 20px; background: #000; border: 1px solid #333; color: #00f2ff; border-radius: 10px; }
        .btn { background: #d4af37; color: #000; padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }
        .result-item { text-align: left; background: #0a0a0a; padding: 15px; margin-top: 10px; border-left: 4px solid #d4af37; cursor: pointer; }
        .result-item:hover { background: #222; }
        h2 { font-family: 'Orbitron'; color: #d4af37; }
    </style>
</head>
<body>

<div class="box">
    <h2>OSINT TRACER</h2>
    <p style="color: #888; font-size: 0.8rem;">ব্যক্তির ডিজিটাল ফুটপ্রিন্ট খুঁজে বের করুন</p>
    
    <input type="text" id="targetInput" placeholder="ইউজারনেম বা ফেসবুক আইডি দিন (উদা: rakib.official)">
    <br>
    <button class="btn" onclick="deepSearch()">DEEP SEARCH START</button>

    <div id="results" style="margin-top: 30px; display: none;">
        <p style="color: #00ff88;">[Analysis Complete] নিচের সোর্সগুলো চেক করুন:</p>
        <div id="linksContainer"></div>
    </div>
</div>

<script>
    function deepSearch() {
        const input = document.getElementById('targetInput').value;
        if(!input) return alert("দয়া করে নাম বা আইডি দিন!");

        const container = document.getElementById('linksContainer');
        container.innerHTML = "";
        document.getElementById('results').style.display = "block";

        // OSINT লজিক: এই লিঙ্কগুলো গুগলের ফিল্টার ব্যবহার করে ওই ব্যক্তির ডাটা খুঁজে বের করবে
        const searchQueries = [
            { name: "Google Footprint (প্রোফাইল ও ছবি)", url: `https://www.google.com/search?q=site:facebook.com+"${input}"` },
            { name: "Global Social Match (অন্যান্য সোশ্যাল মিডিয়া)", url: `https://www.google.com/search?q="${input}"+-site:facebook.com` },
            { name: "LinkedIn Professional Profile", url: `https://www.google.com/search?q=site:linkedin.com/in/"${input}"` },
            { name: "Public Documents & Files", url: `https://www.google.com/search?q="${input}"+filetype:pdf+OR+filetype:doc` },
            { name: "Instagram Identity Check", url: `https://www.instagram.com/${input.replace(/\s+/g, '')}` }
        ];

        searchQueries.forEach(query => {
            const div = document.createElement('div');
            div.className = "result-item";
            div.innerHTML = `<b>> ${query.name}</b><br><small style="color:#666">ক্লিক করে ডাটা দেখুন</small>`;
            div.onclick = () => window.open(query.url, '_blank');
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
