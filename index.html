<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Id Market | Exclusive Marketplace</title>
    <style>
        :root {
            --dark: #050505;
            --gold: linear-gradient(45deg, #d4af37, #f1d592);
            --border-gold: #c6a152;
            --text-gray: #a0a0a0;
        }

        body { background-color: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 50px; }

        /* লোগো ও হেডার */
        .brand-header { text-align: center; padding: 50px 20px; background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); border-bottom: 2px solid var(--border-gold); }
        .brand-header h1 { font-size: 2.5rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 4px; margin: 0; }
        .brand-header p { color: var(--text-gray); letter-spacing: 2px; font-size: 0.9rem; margin-top: 10px; }

        /* আইডি গ্রিড */
        .id-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: 0 auto; }

        /* আইডি কার্ড ডিজাইন */
        .id-card { background: #111; border: 1px solid #222; border-radius: 15px; overflow: hidden; transition: 0.4s ease; position: relative; }
        .id-card:hover { transform: translateY(-10px); border-color: var(--border-gold); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15); }

        /* ভিডিও প্লেয়ার */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* ডিটেইলস */
        .details { padding: 20px; border-top: 1px solid #222; }
        .details h2 { margin: 0; font-size: 1.4rem; color: #f1d592; }
        .details p { color: var(--text-gray); font-size: 0.9rem; margin: 10px 0; min-height: 40px; }
        
        .price-tag { font-size: 1.8rem; font-weight: bold; color: #fff; display: block; margin: 15px 0; }

        /* প্রিমিয়াম হোয়াটসঅ্যাপ বাটন */
        .order-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--gold); color: #000; text-decoration: none; padding: 16px; font-weight: bold; border-radius: 0 0 15px 15px; transition: 0.3s; }
        .order-btn:hover { filter: brightness(1.2); }
        .order-btn img { width: 24px; }
    </style>
</head>
<body>

<div class="brand-header">
    <h1>RAKIB'S ID EMPIRE</h1>
    <p>TRUSTED • SECURE • PREMIUM</p>
</div>

<div class="id-grid" id="main-engine">
    </div>

<script>
    // আপনার কন্ট্রোল রুম (নতুন আইডি এখানে যোগ করুন)
    const inventory = [
        {
            name: "COBRA MAX #001",
            desc: "Level 68 | 5 Evo Guns Max | Season 2 Old Elite Pass.",
            price: "4,500",
            youtubeId: "JFkw3KegcjY",
            whatsapp: "8801854278649" // এখানে নম্বর দিন
        },
        {
            name: "HIP HOP BUNDLE #002",
            desc: "Level 72 | Ranked Master | Rare Blue Skins.",
            price: "12,500",
            youtubeId: "pUgiERw78NU",
            whatsapp: "8801XXXXXXXXX" // এখানে নম্বর দিন
        }
    ];

    function loadInventory() {
        const engine = document.getElementById('main-engine');
        engine.innerHTML = '';

        inventory.forEach(item => {
            const waMsg = encodeURIComponent(`হ্যালো রাকিব ভাই, আমি এই আইডিটি কিনতে চাই:\nআইডি: ${item.name}\nদাম: ${item.price} টাকা।`);
            
            engine.innerHTML += `
                <div class="id-card">
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/${item.youtubeId}" allowfullscreen></iframe>
                    </div>
                    <div class="details">
                        <h2>${item.name}</h2>
                        <p>${item.desc}</p>
                        <span class="price-tag">৳ ${item.price}</span>
                    </div>
                    <a href="https://wa.me/${item.whatsapp}?text=${waMsg}" class="order-btn" target="_blank">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
                        অর্ডার নিশ্চিত করুন
                    </a>
                </div>
            `;
        });
    }

    loadInventory();
</script>

</body>
</html>
