<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID LAGBO | The Trusted ID Empire</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-core: #010101; /* একদম গভীর কালো */
            --dark-deep: #050505;
            --dark-shallow: #101010;
            --gold: linear-gradient(135deg, #d4af37 0%, #f1d592 100%); /* প্রিমিয়াম গোল্ড */
            --border-gold: #c6a152;
            --text-main: #fff;
            --text-gray: #a0a0a0;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--dark-core); color: var(--text-main); margin: 0; padding-bottom: 50px; scroll-behavior: smooth; }

        /* হেডার ও লোগো - আল্ট্রা প্রিমিয়াম */
        .brand-header { text-align: center; padding: 70px 20px 50px; background: radial-gradient(circle, #1a1a1a 0%, var(--dark-core) 100%); border-bottom: 3px solid var(--border-gold); position: relative; }
        .brand-header img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--border-gold); box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); object-fit: cover; }
        .brand-header h1 { font-size: 3rem; font-weight: 800; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 5px; margin: 15px 0 5px; }
        .brand-header p { color: var(--text-gray); letter-spacing: 3px; font-size: 1rem; margin-top: 5px; font-weight: 600; text-transform: uppercase; }

        /* আইডি গ্রিড */
        .id-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; padding: 30px 20px; max-width: 1300px; margin: 0 auto; }

        /* আইডি কার্ড - হাই-এন্ড ডিজাইন */
        .id-card { background: var(--dark-deep); border: 2px solid #222; border-radius: 20px; overflow: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; box-shadow: var(--shadow); }
        .id-card:hover { transform: translateY(-15px) scale(1.02); border-color: var(--border-gold); box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2); }
        
        /* ভিডিও প্লেয়ার - সম্পূর্ণ ফ্রেমলেস */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-bottom: 2px solid var(--border-gold); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* ডিটেইলস সেকশন */
        .details { padding: 25px; border-top: 1px solid #222; position: relative; }
        .details h2 { margin: 0; font-size: 1.6rem; font-weight: 700; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .details p { color: var(--text-gray); font-size: 0.95rem; margin: 15px 0; min-height: 50px; line-height: 1.6; }
        
        /* প্রাইস ট্যাগ - বিশাল ও আধুনিক */
        .price-tag { font-size: 2.2rem; font-weight: 800; color: #fff; display: block; margin: 20px 0; border-top: 1px solid #333; padding-top: 20px; text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1); }

        /* প্রিমিয়াম হোয়াটসঅ্যাপ বাটন - গোল্ডেন ম্যাজিক */
        .order-btn { display: flex; align-items: center; justify-content: center; gap: 12px; background: var(--gold); color: #000; text-decoration: none; padding: 18px; font-weight: 800; font-size: 1.1rem; border-radius: 0 0 20px 20px; transition: 0.3s; box-shadow: 0 -5px 20px rgba(212, 175, 55, 0.15); text-transform: uppercase; letter-spacing: 1px; }
        .order-btn:hover { background: #fff; color: #000; }
        .order-btn img { width: 28px; }

        /* মোবাইল রেসপন্সিভ */
        @media (max-width: 768px) {
            .brand-header h1 { font-size: 2.2rem; letter-spacing: 3px; }
            .brand-header img { width: 120px; height: 120px; }
            .id-grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
            .details h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="brand-header">
    <img src="logo.png" alt="ID LAGBO Logo">
    <h1>ID LAGBO</h1>
    <p>THE TRUSTED ID EMPIRE</p>
</div>

<div class="id-grid" id="market-engine">
    </div>

<script>
    // আপনার কন্ট্রোল রুম (নতুন আইডি এখানে যোগ করুন)
    const inventory = [
        {
            name: "COBRA MAX #001",
            desc: "Level 68 | 5 Evo Guns Max | Season 2 Old Elite Pass skins Included.",
            price: "4,500",
            youtubeId: "quNRATyRdQY", // ১১ অক্ষরের ভিডিও আইডি
            whatsapp: "8801XXXXXXXXX" // এই আইডির জন্য নির্দিষ্ট নম্বর
        },
        {
            name: "HIP HOP BUNDLE #002",
            desc: "Level 72 | Ranked Master | Rare Blue Skins | 100% Secure ID.",
            price: "12,500",
            youtubeId: "pUgiERw78NU", // ১১ অক্ষরের ভিডিও আইডি
            whatsapp: "8801XXXXXXXXX" // অন্য কোনো নম্বর (যেমন আপনার বন্ধুর)
        }
    ];

    function loadInventory() {
        const engine = document.getElementById('market-engine');
        engine.innerHTML = ''; // পুরোনো ডাটা ক্লিন করা

        inventory.forEach(item => {
            // হোয়াটসঅ্যাপ লিংক এবং অটোমেটিক মেসেজ লজিক
            const waMsg = encodeURIComponent(`হ্যালো আইডি লাগবো, আমি এই আইডিটি কিনতে নিশ্চিত করতে চাই:\n\nআইডি: ${item.name}\nদাম: ৳ ${item.price}\n\nঅনুগ্রহ করে অর্ডার নিশ্চিত করুন।`);
            const waLink = `https://wa.me/${item.whatsapp}?text=${waMsg}`;
            
            engine.innerHTML += `
                <div class="id-card">
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/${item.youtubeId}?autoplay=0&modestbranding=1&rel=0" allowfullscreen></iframe>
                    </div>
                    <div class="details">
                        <h2>${item.name}</h2>
                        <p>${item.desc}</p>
                        <span class="price-tag">৳ ${item.price}</span>
                    </div>
                    <a href="${waLink}" class="order-btn" target="_blank">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
                        অর্ডার নিশ্চিত করুন
                    </a>
                </div>
            `;
        });
    }

    // ওয়েবসাইট লোড হলে ফাংশনটি চলবে
    loadInventory();
</script>

</body>
    </html>
