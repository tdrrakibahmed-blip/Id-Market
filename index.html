<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>ID LAGBO | AI Vision & Voice</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; overflow: hidden; text-align: center; }
        #camera-view { width: 100vw; height: 100vh; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0.6; }
        .ui-layer { position: relative; z-index: 10; padding-top: 50px; }
        .ai-status { font-size: 1.2rem; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; margin-bottom: 20px; }
        .mic-btn { width: 80px; height: 80px; border-radius: 50%; background: #d4af37; border: none; cursor: pointer; box-shadow: 0 0 20px #d4af37; }
        .mic-btn:active { transform: scale(0.9); }
        .visualizer { display: flex; justify-content: center; gap: 5px; margin-top: 30px; height: 40px; }
        .bar { width: 5px; height: 10px; background: #00f2ff; animation: pulse 0.5s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { height: 10px; } 50% { height: 40px; } }
    </style>
</head>
<body>

<video id="camera-view" autoplay playsinline></video>

<div class="ui-layer">
    <h1 style="font-family: 'Orbitron'; color: #d4af37; letter-spacing: 5px;">ID LAGBO AI</h1>
    <div class="ai-status" id="status">সিস্টেম অনলাইন | আপনার ক্যামেরা দেখছে...</div>

    <div class="visualizer" id="visualizer" style="display: none;">
        <div class="bar"></div><div class="bar" style="animation-delay: 0.1s"></div>
        <div class="bar" style="animation-delay: 0.2s"></div><div class="bar" style="animation-delay: 0.3s"></div>
    </div>

    <div style="margin-top: 100px;">
        <button class="mic-btn" onclick="startVoice()">🎙️</button>
        <p style="color: #888; margin-top: 15px;">কথা বলতে বাটনে চাপ দিন</p>
    </div>
</div>

<script>
    // ক্যামেরা চালু করার লজিক
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
            document.getElementById('camera-view').srcObject = stream;
        } catch (err) {
            alert("ক্যামেরা এক্সেস করা যায়নি!");
        }
    }

    // ভয়েস এবং এআই লজিক (সিমুলেশন)
    function startVoice() {
        const status = document.getElementById('status');
        const visualizer = document.getElementById('visualizer');
        
        status.innerText = "রাকিব, আমি শুনছি...";
        visualizer.style.display = "flex";

        // এখানে এআই মডেল আপনার কথার উত্তর দেবে
        setTimeout(() => {
            speak("হ্যালো রাকিব, আমি আপনার ক্যামেরা দিয়ে সবকিছু দেখতে পাচ্ছি। আপনার আজকের ট্রেডিং গোল কী?");
            status.innerText = "এআই কথা বলছে...";
        }, 2000);
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'bn-BD';
        window.speechSynthesis.speak(utterance);
        
        utterance.onend = () => {
            document.getElementById('status').innerText = "সিস্টেম অনলাইন | আপনার ক্যামেরা দেখছে...";
            document.getElementById('visualizer').style.display = "none";
        };
    }

    initCamera();
</script>

</body>
</html>
