<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>ID LAGBO | Pro Marketplace</title>
    <style>
        :root { --main-gold: #d4af37; --dark: #111; }
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; }
        .nav { background: var(--dark); padding: 20px; border-bottom: 2px solid var(--main-gold); text-align: center; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .product-card { background: var(--dark); border: 1px solid #333; border-radius: 10px; padding: 15px; text-align: center; }
        .product-card img { width: 100%; border-radius: 5px; }
        .price { color: var(--main-gold); font-size: 1.5rem; margin: 10px 0; }
        .order-btn { background: var(--main-gold); color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        /* অ্যাডমিন প্যানেল (Hidden) */
        .admin-link { position: fixed; bottom: 10px; right: 10px; color: #444; font-size: 10px; text-decoration: none; }
    </style>
</head>
<body>

<div class="nav">
    <h1 id="shopName">আমার ডিজিটাল শপ</h1>
    <p id="shopTagline">কম খরচে সেরা পণ্য</p>
</div>

<div class="container" id="productGrid">
    <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>লোডিং হচ্ছে...</h3>
        <p class="price">৳ 00</p>
        <button class="order-btn">অর্ডার করুন</button>
    </div>
</div>

<script>
    // --- ক্লায়েন্টের কনফিগারেশন (যা আপনি বিক্রি করবেন) ---
    const config = {
        whatsapp: "8801700000000", // দোকানদারের নম্বর
        shopName: "Rakib's Tech Store",
        currency: "৳"
    };

    // পণ্যের ডাটা (এটি ভবিষ্যতে Google Sheet থেকে আসবে)
    const products = [
        { name: "স্মার্ট ওয়াচ", price: "2500", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200" },
        { name: "গেমিং হেডফোন", price: "1800", img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200" }
    ];

    function loadProducts() {
        document.getElementById('shopName').innerText = config.shopName;
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";

        products.forEach(p => {
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p class="price">${config.currency} ${p.price}</p>
                    <button class="order-btn" onclick="sendOrder('${p.name}', '${p.price}')">WhatsApp এ অর্ডার দিন</button>
                </div>
            `;
        });
    }

    function sendOrder(name, price) {
        const msg = encodeURIComponent(`নতুন অর্ডার!\nপণ্য: ${name}\nদাম: ${price}\nআমি এটি কিনতে চাই।`);
        window.open(`https://wa.me/${config.whatsapp}?text=${msg}`, '_blank');
    }

    loadProducts();
</script>

</body>
</html>
