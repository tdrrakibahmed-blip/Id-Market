<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID LAGBO | Autonomous AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; overflow: hidden; }
        #camera-feed { width: 100vw; height: 100vh; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; filter: brightness(0.6) contrast(1.2); }
        .overlay { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 0; background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%); }
        .ai-brain { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #d4af37; box-shadow: 0 0 30px #d4af37; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px #d4af37; } 50% { transform: scale(1.1); box-shadow: 0 0 50px #d4af37; } 100% { transform: scale(1); box-shadow: 0 0 20px #d4af37; } }
        .status-text { font-family: 'Orbitron', sans-serif; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; font-size: 1.1rem; margin-top: 20px; }
        .controls { margin-bottom: 50px; }
        .btn-talk { background: #d4af37; color: #000; border: none; padding: 20px 40px; border-radius: 50px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; font-size: 1.2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<video id="camera-feed" autoplay playsinline></video>

<div class="overlay">
    <div style="text-align: center;">
        <h1 style="font-family: 'Orbitron'; color: #d4af37; letter-spacing: 8px; margin: 0;">ID LAGBO AI</h1>
        <p style="color: #888; font-size: 0.8rem;">REAL-TIME VISION & VOICE ACTIVE</p>
        <div class="ai-brain" id="brain"><span style="font-size: 3rem;">👁️</span></div>
        <div class="status-text" id="status-display">ক্যামেরা স্ক্যানিং... সিস্টেম অনলাইন।</div>
    </div>

    <div class="controls">
        <button class="btn-talk" id="talkBtn" onclick="startListening()">কথা বলুন</button>
    </div>
</div>

<script>
    const statusDisplay = document.getElementById('status-display');
    const brain = document.getElementById('brain');
    
    // ক্যামেরা চালু করা
    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
            document.getElementById('camera-feed').srcObject = stream;
        } catch (e) {
            statusDisplay.innerText = "Error: ক্যামেরা এক্সেস পাওয়া যায়নি!";
        }
    }

    // কথা বলার ইঞ্জিন (TTS)
    function speak(text) {
        window.speechSynthesis.cancel(); // আগের কথা বন্ধ করা
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'bn-BD';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        
        utterance.onstart = () => {
            statusDisplay.innerText = "এআই উত্তর দিচ্ছে...";
            brain.style.borderColor = "#00ff88";
        };
        
        utterance.onend = () => {
            statusDisplay.innerText = "আমি আপনার ক্যামেরা দিয়ে দেখছি, রাকিব।";
            brain.style.borderColor = "#d4af37";
        };
        
        window.speechSynthesis.speak(utterance);
    }

    // আপনার কথা শোনার ইঞ্জিন (STT)
    function startListening() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'bn-BD';
        
        recognition.onstart = () => {
            statusDisplay.innerText = "আমি শুনছি, রাকিব...";
            brain.style.borderColor = "#00f2ff";
        };

        recognition.onresult = (event) => {
            const userText = event.results[0][0].transcript;
            processCommand(userText);
        };

        recognition.onerror = () => {
            statusDisplay.innerText = "আবার চেষ্টা করুন...";
        };

        recognition.start();
    }

    // আপনার কমান্ড প্রসেস করা
    function processCommand(command) {
        console.log("User said:", command);
        
        if (command.includes("কেমন আছো") || command.includes("হ্যালো")) {
            speak("হ্যালো রাকিব। আমি আপনার আইডি লাগবো অ্যাসিস্ট্যান্ট। আমি আপনার ক্যামেরা দিয়ে সবকিছু দেখতে পাচ্ছি। আপনার আজকের দিনটি কেমন যাচ্ছে?");
        } else if (command.includes("কি দেখছো") || command.includes("সামনে কি")) {
            speak("রাকিব, আমি আপনার ক্যামেরার মাধ্যমে সামনে থাকা পরিবেশ পর্যবেক্ষণ করছি। আমি এখানে ডাটা প্যাটার্ন খুঁজছি যা আপনার ব্যবসায় কাজে লাগতে পারে।");
        } else if (command.includes("মার্কেট") || command.includes("ট্রেডিং")) {
            speak("আপনার ফরেক্স মার্কেটের ১ শতাংশ রিস্ক ম্যানেজমেন্ট প্রোটোকল সচল আছে। ধৈর্য ধরুন, সঠিক সুযোগের জন্য অপেক্ষা করুন।");
        } else {
            speak("আমি আপনার কথা বুঝতে পেরেছি। আপনার এই পরিকল্পনাটি আপনার ১০ থেকে ৩০ লাখ টাকা আয়ের লক্ষ্যের সাথে সামঞ্জস্যপূর্ণ।");
        }
    }

    setupCamera();
    // ইনিশিয়াল গ্রিটিং
    setTimeout(() => {
        speak("সিস্টেম অনলাইন। হ্যালো রাকিব আহমেদ, আমি আপনার ডিজিটাল রাজত্বের পাহারাদার। আমি প্রস্তুত।");
    }, 2000);
</script>

</body>
        </html>
