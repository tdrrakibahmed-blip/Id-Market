<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID LAGBO | The Trusted ID Empire</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-core: #010101;
            --gold: linear-gradient(135deg, #d4af37 0%, #f1d592 100%);
            --border-gold: #c6a152;
            --text-gray: #a0a0a0;
            --available: #2ecc71; /* সবুজ */
            --sold: #e74c3c; /* লাল */
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--dark-core); color: #fff; margin: 0; padding-bottom: 50px; overflow-x: hidden; }

        /* হেডার - আপনার ফিক্সড লোগো ও নাম */
        .brand-header { text-align: center; padding: 60px 20px; background: radial-gradient(circle, #151515 0%, var(--dark-core) 100%); border-bottom: 2px solid var(--border-gold); }
        .brand-header img { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--border-gold); box-shadow: 0 0 25px rgba(212, 175, 55, 0.3); }
        .brand-header h1 { font-size: 2.8rem; font-weight: 800; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 15px 0 5px; }
        .brand-header p { color: var(--text-gray); letter-spacing: 3px; font-size: 0.9rem; text-transform: uppercase; }

        /* ট্রাস্ট ব্যাজ সেকশন */
        .trust-section { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 20px; background: #080808; border-bottom: 1px solid #222; }
        .badge { display: flex; align-items: center; gap: 8px; color: #f1d592; font-size: 0.85rem; font-weight: 600; }

        /* আইডি গ্রিড */
        .id-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1300px; margin: 0 auto; }

        /* আইডি কার্ড */
        .id-card { background: #0c0c0c; border: 1px solid #222; border-radius: 20px; overflow: hidden; position: relative; transition: 0.4s; }
        .id-card:hover { transform: translateY(-10px); border-color: var(--border-gold); box-shadow: 0 10px 40px rgba(212, 175, 55, 0.15); }

        /* স্ট্যাটাস ব্যাজ (Available/Sold Out) */
        .status-badge { position: absolute; top: 15px; right: 15px; padding: 6px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .status-available { background: var(--available); color: #000; }
        .status-sold { background: var(--sold); color: #fff; }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-bottom: 2px solid #222; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .details { padding: 25px; }
        .details h2 { margin: 0; font-size: 1.5rem; color: #f1d592; }
        .details p { color: var(--text-gray); font-size: 0.9rem; line-height: 1.6; margin: 15px 0; min-height: 45px; }
        
        .price-tag { font-size: 2rem; font-weight: 800; color: #fff; display: block; margin-top: 15px; padding-top: 15px; border-top: 1px solid #222; }

        /* হোয়াটসঅ্যাপ বাটন */
        .order-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--gold); color: #000; text-decoration: none; padding: 18px; font-weight: 800; font-size: 1.1rem; transition: 0.3s; text-transform: uppercase; }
        .order-btn:hover { background: #fff; transform: scale(1.02); }
        .order-btn.sold-btn { background: #333; color: #888; cursor: not-allowed; pointer-events: none; }
        .order-btn img { width: 25px; }

        @media (max-width: 600px) {
            .brand-header h1 { font-size: 2.2rem; }
            .id-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="brand-header">
    <img src="logo.png" alt="ID LAGBO">
    <h1>ID LAGBO</h1>
    <p>THE TRUSTED ID EMPIRE</p>
</div>

<div class="trust-section">
    <div class="badge">🛡️ 100% SECURE</div>
    <div class="badge">⚡ FAST DELIVERY</div>
    <div class="badge">🤝 VERIFIED OWNER</div>
</div>

<div class="id-grid" id="market-engine">
    </div>

<script>
    const inventory = [
        {
            name: "COBRA MAX #001",
            desc: "Level 68 | 5 Evo Guns Max | Season 2 Old Elite Pass skins.",
            price: "4,500",
            youtubeId: "quNRATyRdQY",
            whatsapp: "8801XXXXXXXXX",
            isSold: false // যদি বিক্রি হয়ে যায় তবে এটাকে true করে দেবেন
        },
        {
            name: "HIP HOP BUNDLE #002",
            desc: "Level 72 | Ranked Master | Rare Blue Skins | 100% Secure.",
            price: "12,500",
            youtubeId: "pUgiERw78NU",
            whatsapp: "8801XXXXXXXXX",
            isSold: true // এটি sold out দেখাবে
        }
    ];

    function loadInventory() {
        const engine = document.getElementById('market-engine');
        engine.innerHTML = '';

        inventory.forEach(item => {
            const statusClass = item.isSold ? 'status-sold' : 'status-available';
            const statusText = item.isSold ? 'Sold Out' : 'Available';
            const btnClass = item.isSold ? 'order-btn sold-btn' : 'order-btn';
            const btnText = item.isSold ? 'Stock Out' : 'অর্ডার নিশ্চিত করুন';
            
            const waMsg = encodeURIComponent(`হ্যালো আইডি লাগবো, আমি এই আইডিটি নিতে চাই:\nআইডি: ${item.name}\nদাম: ৳ ${item.price}`);
            
            engine.innerHTML += `
                <div class="id-card">
                    <div class="status-badge ${statusClass}">${statusText}</div>
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/${item.youtubeId}" allowfullscreen></iframe>
                    </div>
                    <div class="details">
                        <h2>${item.name}</h2>
                        <p>${item.desc}</p>
                        <span class="price-tag">৳ ${item.price}</span>
                    </div>
                    <a href="https://wa.me/${item.whatsapp}?text=${waMsg}" class="${btnClass}" target="_blank">
                        ${!item.isSold ? '<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">' : ''}
                        ${btnText}
                    </a>
                </div>
            `;
        });
    }

    loadInventory();
</script>

</body>
    </html>
